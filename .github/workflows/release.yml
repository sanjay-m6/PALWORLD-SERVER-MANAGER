name: "Release & Publish Updater"

# ─── Triggers ─────────────────────────────────────────────────────────────────
# 1. Manual dispatch from GitHub Actions UI (for on-demand releases)
# 2. Automatic trigger when a version tag like v1.2.3 is pushed
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  release:
    permissions:
      contents: write                       # Required to create GitHub Releases

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"      # Windows NSIS/MSI build

    runs-on: ${{ matrix.platform }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ── 3. Rust Toolchain ──────────────────────────────────────────────────
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── 4. Rust Dependency Cache ───────────────────────────────────────────
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ── 5. Frontend Dependencies ───────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install

      # ── 6. Clean Private Key and Password ────────────────────────────────
      - name: Clean Private Key and Password
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          CLEAN_KEY=$(echo -n "$RAW_KEY" | tr -d '\n\r')
          echo "::add-mask::$CLEAN_KEY"
          echo "CLEAN_PRIVATE_KEY=$CLEAN_KEY" >> $GITHUB_ENV
          
          CLEAN_PASSWORD=$(echo -n "$RAW_PASSWORD" | tr -d '\n\r')
          echo "::add-mask::$CLEAN_PASSWORD"
          echo "CLEAN_PRIVATE_KEY_PASSWORD=$CLEAN_PASSWORD" >> $GITHUB_ENV

      # ── 7. Build Tauri App + Updater Artifacts ─────────────────────────────
      # This step:
      #   - Compiles the Rust backend
      #   - Bundles the frontend
      #   - Produces NSIS installer (.exe) and updater bundle (.nsis.zip)
      #   - Signs the updater bundle with TAURI_SIGNING_PRIVATE_KEY
      #   - Generates latest.json updater manifest
      #   - Creates a draft GitHub Release with all artifacts attached
      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.CLEAN_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.CLEAN_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Palworld Server Manager v__VERSION__"
          releaseBody: |
            ## Palworld Server Manager v__VERSION__

            This release introduces major updates to the Discord Integration, including real-time connection status tracking, intents fallback logic, and a fallback plain-text command parser.

            ### 🚀 New Features & Improvements
            - **Real-time Status Tracking**: Shows the precise connection state (`offline`, `connecting`, `online`) of your Discord Bot directly in the Tauri Manager dashboard.
            - **Intents Fallback Logic**: Automatically detects and recovers from missing Privileged Intents (like Message Content Intent). If disabled in the Developer Portal, the bot falls back gracefully to keep Dashboard and Event Alert updates fully functional.
            - **Instant Slash Commands**: Automatically registers all commands for the guilds the bot is currently in upon connection, making them instantly available to users without the standard 1-hour global Discord command cache delay.
            - **Text Command Parser**: Added prefix/text command parsing (`/status`, `!status <id>`, `!players`, `!start <id>`, etc.) as a fallback option when slash commands are slow or if you prefer typing.
            - **Live Dashboard Setup Command**: Run `/dashboard <server_id>` or `!dashboard <server_id>` in any Discord channel to automatically set it as the live dashboard channel and post the server dashboard embed.
            - **Tauri App UI Command Reference**: Updated the Discord tab guide to display the new `/dashboard` command reference.

            ### 🐛 Bug Fixes
            - **Auto-Update Success Alerts**: Resolved the race condition and sorting mismatch where the update manager queried the oldest database history record to verify success, causing false-positive `Update Failed` notifications to Discord.
            - **Background Thread Safety**: Prevented database locking issues during async `.await` execution in command interactions.
            - **Tauri Command Safety**: Prevented triggering dashboard refreshes while the bot is offline or still connecting.

            ---
            _Developed by Sanjay._
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          generateReleaseNotes: true
