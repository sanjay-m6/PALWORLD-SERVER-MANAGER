name: "Release & Publish Updater"

# ─── Triggers ─────────────────────────────────────────────────────────────────
# 1. Manual dispatch from GitHub Actions UI (for on-demand releases)
# 2. Automatic trigger when a version tag like v1.2.3 is pushed
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  release:
    permissions:
      contents: write                       # Required to create GitHub Releases

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"      # Windows NSIS/MSI build

    runs-on: ${{ matrix.platform }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ── 3. Rust Toolchain ──────────────────────────────────────────────────
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── 4. Rust Dependency Cache ───────────────────────────────────────────
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ── 5. Frontend Dependencies ───────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install

      # ── 6. Clean Private Key and Password ────────────────────────────────
      - name: Clean Private Key and Password
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          CLEAN_KEY=$(echo -n "$RAW_KEY" | tr -d '\n\r')
          echo "::add-mask::$CLEAN_KEY"
          echo "CLEAN_PRIVATE_KEY=$CLEAN_KEY" >> $GITHUB_ENV
          
          CLEAN_PASSWORD=$(echo -n "$RAW_PASSWORD" | tr -d '\n\r')
          echo "::add-mask::$CLEAN_PASSWORD"
          echo "CLEAN_PRIVATE_KEY_PASSWORD=$CLEAN_PASSWORD" >> $GITHUB_ENV

      # ── 7. Build Tauri App + Updater Artifacts ─────────────────────────────
      # This step:
      #   - Compiles the Rust backend
      #   - Bundles the frontend
      #   - Produces NSIS installer (.exe) and updater bundle (.nsis.zip)
      #   - Signs the updater bundle with TAURI_SIGNING_PRIVATE_KEY
      #   - Generates latest.json updater manifest
      #   - Creates a draft GitHub Release with all artifacts attached
      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.CLEAN_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.CLEAN_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Palworld Server Manager v__VERSION__"
          releaseBody: |
            ## Palworld Server Manager v__VERSION__

            This release introduces major UI upgrades, improved server cloning resilience, flawless SteamCMD downloads, and protocol-specific port collision check resolutions.

            ### 🚀 New Features & Improvements
            - **Modern Dynamic Background Slideshow**: Replaced the static background with a premium full-viewport slideshow featuring rotating high-quality Palworld artwork with pan-and-zoom Ken Burns effects and smooth cross-fades.
            - **Sidebar Quick Actions**: Added context menu (on right-click) and hover vertical ellipsis options for all sidebar servers, supporting quick actions: Start/Stop, Clone, and Delete.
            - **Save-Filtered Folder Cloning**: Clones the entire server folder recursively so that binaries, engine configurations, and files are copied. Excludes the original `SaveGames` database so that cloned instances start fresh.
            - **Auto & Manual Port Allocation UI**: Redesigned the port selection step with automatic port assignment and locked/faded fields, with support for custom manual override settings.
            - **Resilient SteamCMD Downloader**: Implemented high-level retries (3 attempts with 5-second cooldowns) that automatically clean orphaned background tasks and corrupt files between trials. The progress logs dashboard now stays open on complete/fail to inspect terminal logs.
            - **Capsule-Tab HUD Glows**: Replaced bottom-border tabs with premium capsule-shaped tabs, customized with signature glows and slide-up animations.

            ### 🐛 Bug Fixes
            - **TCP/UDP Port Checkers Resolution**: Fixed false port-in-use blocks on Windows/Hyper-V by separating checks: game port checked using UDP only, and RCON/REST API ports checked using TCP only.
            - **Space Directory Sanitization**: Automatically sanitizes and replaces space characters in server paths and clone paths with underscores (`_`) to avoid SteamCMD installation aborts.

            ---
            _Developed by Sanjay._
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          generateReleaseNotes: true
