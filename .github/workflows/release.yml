name: "Release & Publish Updater"

# ─── Triggers ─────────────────────────────────────────────────────────────────
# 1. Manual dispatch from GitHub Actions UI (for on-demand releases)
# 2. Automatic trigger when a version tag like v1.2.3 is pushed
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  release:
    permissions:
      contents: write                       # Required to create GitHub Releases

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"      # Windows NSIS/MSI build

    runs-on: ${{ matrix.platform }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ── 3. Rust Toolchain ──────────────────────────────────────────────────
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── 4. Rust Dependency Cache ───────────────────────────────────────────
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ── 5. Frontend Dependencies ───────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install

      # ── 6. Clean Private Key and Password ────────────────────────────────
      - name: Clean Private Key and Password
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          CLEAN_KEY=$(echo -n "$RAW_KEY" | tr -d '\n\r')
          echo "::add-mask::$CLEAN_KEY"
          echo "CLEAN_PRIVATE_KEY=$CLEAN_KEY" >> $GITHUB_ENV
          
          CLEAN_PASSWORD=$(echo -n "$RAW_PASSWORD" | tr -d '\n\r')
          echo "::add-mask::$CLEAN_PASSWORD"
          echo "CLEAN_PRIVATE_KEY_PASSWORD=$CLEAN_PASSWORD" >> $GITHUB_ENV

      # ── 7. Build Tauri App + Updater Artifacts ─────────────────────────────
      # This step:
      #   - Compiles the Rust backend
      #   - Bundles the frontend
      #   - Produces NSIS installer (.exe) and updater bundle (.nsis.zip)
      #   - Signs the updater bundle with TAURI_SIGNING_PRIVATE_KEY
      #   - Generates latest.json updater manifest
      #   - Creates a draft GitHub Release with all artifacts attached
      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.CLEAN_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.CLEAN_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Palworld Server Manager v__VERSION__"
          releaseBody: |
            ## Palworld Server Manager v__VERSION__

            This release introduces Steam Query Port configuration, process argument handling for query ports, automatic OS status self-healing, and real-time server lifecycle event synchronization.

            ### 🚀 New Features & Improvements
            - **Configurable Steam Query Port**: Added full support for configuring custom Steam Query Ports (`QueryPort`, default: `27015`). Automatically appends `-queryport=XXXXX` to `PalServer.exe` process launch arguments to prevent port collisions with games like Deadlock.
            - **Auto & Manual Query Port Allocation**: Integrated Query Port selection in server creation/importing step 2, visual INI config editor, auto port assignment, and dedicated Windows Firewall rules.
            - **Automatic Server Status Self-Healing**: Implemented automatic OS process checking (`sysinfo`) on server list retrieval. Mismatched or orphaned process statuses in database are self-healed and synced in real-time.
            - **Reactive Server Lifecycle Listener**: Registered a global event listener for `server-lifecycle` events in the frontend, ensuring instant state reflection when servers start, stop, or crash.
            - **High-Frequency Process Crash Monitor**: Optimized crash monitoring cycle to 3-second intervals for rapid crash feedback.

            ### 🐛 Bug Fixes
            - **Offline Status Out-of-Sync Fix**: Resolved issues where servers could remain marked as ONLINE in the UI even after the game server process was terminated or crashed.
            - **Query Port Firewall & Collision Resolution**: Resolved query port binding conflicts and ensured Windows Defender Firewall UDP rules are automatically added for Query Ports.

            ---
            _Developed by Sanjay._
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          generateReleaseNotes: true
