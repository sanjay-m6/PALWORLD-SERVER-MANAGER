name: "Release & Publish Updater"

# ─── Triggers ─────────────────────────────────────────────────────────────────
# 1. Manual dispatch from GitHub Actions UI (for on-demand releases)
# 2. Automatic trigger when a version tag like v1.2.3 is pushed
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  release:
    permissions:
      contents: write                       # Required to create GitHub Releases

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"      # Windows NSIS/MSI build

    runs-on: ${{ matrix.platform }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ── 3. Rust Toolchain ──────────────────────────────────────────────────
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── 4. Rust Dependency Cache ───────────────────────────────────────────
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ── 5. Frontend Dependencies ───────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install

      # ── 6. Clean Private Key and Password ────────────────────────────────
      - name: Clean Private Key and Password
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          CLEAN_KEY=$(echo -n "$RAW_KEY" | tr -d '\n\r')
          echo "::add-mask::$CLEAN_KEY"
          echo "CLEAN_PRIVATE_KEY=$CLEAN_KEY" >> $GITHUB_ENV
          
          CLEAN_PASSWORD=$(echo -n "$RAW_PASSWORD" | tr -d '\n\r')
          echo "::add-mask::$CLEAN_PASSWORD"
          echo "CLEAN_PRIVATE_KEY_PASSWORD=$CLEAN_PASSWORD" >> $GITHUB_ENV

      # ── 7. Build Tauri App + Updater Artifacts ─────────────────────────────
      # This step:
      #   - Compiles the Rust backend
      #   - Bundles the frontend
      #   - Produces NSIS installer (.exe) and updater bundle (.nsis.zip)
      #   - Signs the updater bundle with TAURI_SIGNING_PRIVATE_KEY
      #   - Generates latest.json updater manifest
      #   - Creates a draft GitHub Release with all artifacts attached
      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.CLEAN_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.CLEAN_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Palworld Server Manager v__VERSION__"
          releaseBody: |
            ## Palworld Server Manager v__VERSION__

            This release introduces server auto-restart on crashes, running the server as administrator, player direct messaging (broadcasts), system resource polling optimizations, and Steam Workshop/local ZIP logic mods registration overrides.

            ### 🚀 New Features & Improvements
            - **Auto-Restart on Crash:** Automatically recovers the dedicated server process if it crashes or stops unexpectedly.
            - **Run Server as Administrator:** Added backend & UI support to spawn the `PalServer` process elevated on Windows via PowerShell (`Start-Process -Verb RunAs`).
            - **Player Direct Messages:** Allows administrators to broadcast targeted alert warnings to individual players on the server using RCON.
            - **Workshop & URL Logic Mods Support:** Dynamically overrides and updates the `InstallRule` in `Info.json` when installing logic/script mods (forcing registration under `LogicMods` rather than `Paks`) for Steam Workshop subscriptions, URL downloads, and local file imports.
            - **Warning Modal Local Import Integration:** Added an "Import Downloaded File" action directly inside the Steam Workshop warning modal for easier manual installations.
            - **Performance Optimizations:** Refactored system analyzer and crash monitoring loops to query process statistics only for the target PID via `sysinfo::ProcessesToUpdate::Some(&[Pid])`, reducing app CPU usage to 0%.

            ---
            _Developed by Sanjay._
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          generateReleaseNotes: true
