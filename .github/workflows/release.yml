name: "Release & Publish Updater"

# ─── Triggers ─────────────────────────────────────────────────────────────────
# 1. Manual dispatch from GitHub Actions UI (for on-demand releases)
# 2. Automatic trigger when a version tag like v1.2.3 is pushed
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  release:
    permissions:
      contents: write                       # Required to create GitHub Releases

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"      # Windows NSIS/MSI build

    runs-on: ${{ matrix.platform }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ── 3. Rust Toolchain ──────────────────────────────────────────────────
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── 4. Rust Dependency Cache ───────────────────────────────────────────
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ── 5. Frontend Dependencies ───────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install

      # ── 6. Clean Private Key and Password ────────────────────────────────
      - name: Clean Private Key and Password
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          CLEAN_KEY=$(echo -n "$RAW_KEY" | tr -d '\n\r')
          echo "::add-mask::$CLEAN_KEY"
          echo "CLEAN_PRIVATE_KEY=$CLEAN_KEY" >> $GITHUB_ENV
          
          CLEAN_PASSWORD=$(echo -n "$RAW_PASSWORD" | tr -d '\n\r')
          echo "::add-mask::$CLEAN_PASSWORD"
          echo "CLEAN_PRIVATE_KEY_PASSWORD=$CLEAN_PASSWORD" >> $GITHUB_ENV

      # ── 7. Build Tauri App + Updater Artifacts ─────────────────────────────
      # This step:
      #   - Compiles the Rust backend
      #   - Bundles the frontend
      #   - Produces NSIS installer (.exe) and updater bundle (.nsis.zip)
      #   - Signs the updater bundle with TAURI_SIGNING_PRIVATE_KEY
      #   - Generates latest.json updater manifest
      #   - Creates a draft GitHub Release with all artifacts attached
      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.CLEAN_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.CLEAN_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Palworld Server Manager v__VERSION__"
          releaseBody: |
            ## Palworld Server Manager v__VERSION__

            This major release introduces multi-server instance cloning, graceful countdown restarts, direct server migration packages, logs terminal upgrades, and advanced game configuration options.

            ### 🚀 New Features & Improvements
            - **Multi-Server Instance Cloning:** Instantly replicate any existing server's configuration, SQLite entries, non-conflicting port allocations, and world save files to a new directory from the Dashboard or Server Detail view.
            - **Graceful Restarts & Countdown Warnings:** Restarts and stops now broadcast countdown messages in-game over REST API/RCON (e.g. 30s/15s warnings) if players are online, trigger a save, and perform a clean shutdown. Suppresses false-positive crash-monitor alerts.
            - **Direct Server Migration Packages:** Export a server's complete world save data (`Pal/Saved`) and installed mods (`Mods`) into a single ZIP migration package with a `server_metadata.json` manifest, then import it on any machine to set up the server instantly.
            - **Upgraded Logs Terminal:** Complete terminal emulator in the Logs tab supporting direct RCON command execution, clean console logs streaming (hides headers/timestamps), auto-scroll toggle, command history, and log exports.
            - **Garbage Collection (Engine) Optimizations:** Automatically configures garbage collection tuning settings inside `Engine.ini` (`[/Script/Engine.GarbageCollectionSettings]`) when "Optimize RAM" is active to mitigate server process memory leaks.
            - **Steam Workshop Authenticated Downloads:** Supports authenticated logins (`steam_username` setting) instead of anonymous downloads, fixing SteamCMD download restrictions for paid games, with helpful error messages for Steam Guard caching.
            - **CurseForge Integration & Autocleanup:** Integrated CurseForge API searches for Palworld mods, and auto-cleans up older version files of the same mod in the destination folder to prevent startup conflicts.

            ### 🐛 Bug Fixes
            - **Ban List Formatting Fixes:** Standardizes Steam ID bans with or without `steam_` prefixes, preventing entry duplication and formatting bugs.
            - **Donation Options Clean-Up:** Removed credit card validation scripts and layouts to focus entirely on direct links for Ko-fi, PayPal, and GitHub sponsorships.

            ---
            _Developed by Sanjay._
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          generateReleaseNotes: true
