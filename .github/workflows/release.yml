name: "Release & Publish Updater"

# ─── Triggers ─────────────────────────────────────────────────────────────────
# 1. Manual dispatch from GitHub Actions UI (for on-demand releases)
# 2. Automatic trigger when a version tag like v1.2.3 is pushed
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  release:
    permissions:
      contents: write                       # Required to create GitHub Releases

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"      # Windows NSIS/MSI build

    runs-on: ${{ matrix.platform }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ── 3. Rust Toolchain ──────────────────────────────────────────────────
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── 4. Rust Dependency Cache ───────────────────────────────────────────
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ── 5. Frontend Dependencies ───────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install

      # ── 6. Clean Private Key and Password ────────────────────────────────
      - name: Clean Private Key and Password
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          CLEAN_KEY=$(echo -n "$RAW_KEY" | tr -d '\n\r')
          echo "::add-mask::$CLEAN_KEY"
          echo "CLEAN_PRIVATE_KEY=$CLEAN_KEY" >> $GITHUB_ENV
          
          CLEAN_PASSWORD=$(echo -n "$RAW_PASSWORD" | tr -d '\n\r')
          echo "::add-mask::$CLEAN_PASSWORD"
          echo "CLEAN_PRIVATE_KEY_PASSWORD=$CLEAN_PASSWORD" >> $GITHUB_ENV

      # ── 7. Build Tauri App + Updater Artifacts ─────────────────────────────
      # This step:
      #   - Compiles the Rust backend
      #   - Bundles the frontend
      #   - Produces NSIS installer (.exe) and updater bundle (.nsis.zip)
      #   - Signs the updater bundle with TAURI_SIGNING_PRIVATE_KEY
      #   - Generates latest.json updater manifest
      #   - Creates a draft GitHub Release with all artifacts attached
      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.CLEAN_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.CLEAN_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Palworld Server Manager v__VERSION__"
          releaseBody: |
            ## Palworld Server Manager v__VERSION__

            This release introduces major stability fixes, UI/UX overhauls for the Mod Manager, automated Windows Defender Firewall rules, and public server listing visibility fixes.

            ### 🚀 New Features & Improvements
            - **REST API Mod Discovery Migration:** Shifted mod searches away from the deprecated/offline `search.nexusmods.com` service to the official authenticated `api.nexusmods.com` REST API. Supports smart keyword filtering, direct Mod ID queries, and Nexus link parses.
            - **Interactive Mod Details Modal:** Click on any mod in the discover grid to view details, platform tags, authors, download statistics, and full BBCode/Markdown-parsed descriptions.
            - **Native BBCode & Markdown Rendering:** Custom HTML renderer parses Nexus BBCode tags and Modrinth Markdown formats on the fly for safe native displaying.
            - **Mod Type Classification Guide:** Details tab distinguishes between Standard Asset Mods (`/Paks/`) and Script/Logic Mods (`/LogicMods/`), checks if the **UE4SS framework** is installed on the server, and provides a direct installer if missing.
            - **Nexus Mods Free Account Fallback:** Gracefully intercepts 403 Forbidden API errors on free accounts. Displays a friendly manual guide and direct browser link instead of crashing.
            - **Inline Manual Importing:** Added an "Import Downloaded File" button inside the details modal and warning popups to pick local `.zip` or `.pak` files directly.
            - **Automated Local Zip Unpacking:** Refactored the local file manager to automatically unpack and extract `.pak` assets from imported `.zip` archives.
            - **Automated Firewall Port Allocation:** Port auto-allocation and server creation wizards now automatically execute Windows Defender rules, setting up inbound UDP/TCP exceptions for Game, RCON, and REST API ports.
            - **UAC Elevation Privilege Split:** Configured manifest profiles to run under standard user privileges in dev mode (resolving OS Error 740 elevation crashes) and enforce admin mode exclusively in production release builds.
            - **Community Server Visibility:** Automatically appends `EpicApp=PalServer` and `-publiclobby` parameters on startup to list servers in the public in-game server browser.

            ### 🛠️ Visual & UX Refinements
            - Added container translate-up and border shadow animations on card hovers.
            - Implemented image scale-zoom transitions for card thumbnails.
            - Added vector SVG icons for authors and download metrics.
            - Integrated `formatNumber` to format large numbers (e.g. `407.4k` instead of raw integers).
            - Updated NEXUS and MODRINTH platform badges.

            ---
            _Developed by Sanjay._
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          generateReleaseNotes: true
